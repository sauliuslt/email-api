server:
    interface: 0.0.0.0
    port: 53
    access-control: 0.0.0.0/0 refuse
    access-control: 127.0.0.0/8 allow
    access-control: 10.0.0.0/8 allow
    access-control: 172.16.0.0/12 allow
    access-control: 192.168.0.0/16 allow
    do-ip6: no
    hide-identity: yes
    hide-version: yes

    # Performance
    num-threads: 1
    msg-cache-size: 4m
    rrset-cache-size: 8m

    # Logging
    verbosity: 1
    logfile: ""
    log-queries: no
