services:
  email-mysql:
    image: mysql:8.0
    env_file: .env
    volumes:
      - ./data/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  email-redis:
    image: redis:7-alpine
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  email-unbound:
    build:
      context: ./docker/unbound
    ports:
      - "127.0.0.1:53:53/udp"
      - "127.0.0.1:53:53/tcp"
    volumes:
      - ./docker/unbound/unbound.conf:/etc/unbound/unbound.conf:ro
    healthcheck:
      test: ["CMD", "dig", "@127.0.0.1", "google.com"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  email-spamassassin:
    image: instantlinux/spamassassin:latest
    volumes:
      - ./data/spamassassin:/var/lib/spamassassin
    restart: unless-stopped

  email-postfix:
    build:
      context: ./docker/postfix
    network_mode: host
    environment:
      DNS_RESOLVER_IP: "127.0.0.1"
      API_URL: http://127.0.0.1:3000
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
    volumes:
      - postfix-config:/etc/postfix/dynamic
    restart: unless-stopped

  email-api:
    build: .
    ports:
      - "127.0.0.1:3000:3000"
    env_file: .env
    environment:
      NODE_ENV: production
      POSTFIX_CONFIG_DIR: /app/config/postfix
      DNS_RESOLVER: email-unbound
    volumes:
      - postfix-config:/app/config/postfix
    networks:
      - default
      - email-api-network
    depends_on:
      email-mysql:
        condition: service_healthy
      email-redis:
        condition: service_healthy
      email-unbound:
        condition: service_healthy
    restart: unless-stopped

  email-postfix-relay:
    image: alpine/socat
    command: tcp-listen:25,fork,reuseaddr tcp:host-gateway:25
    extra_hosts:
      - "host-gateway:host-gateway"
    restart: unless-stopped

  email-worker:
    build: .
    command: ["node", "dist/workers/index.js"]
    env_file: .env
    environment:
      NODE_ENV: production
      POSTFIX_CONFIG_DIR: /app/config/postfix
      SMTP_HOST: email-postfix-relay
    depends_on:
      email-mysql:
        condition: service_healthy
      email-redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postfix-config:

networks:
  email-api-network:
    name: email-api-network
